<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - San-Lorenzo</title>
    <link rel="stylesheet" href="assets/css/main.css">
</head>

<body>

    <header id="main-header" class="scrolled">
        <a href="index.html" class="logo">SAN-LORENZO</a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
        </nav>
    </header>

    <!-- Reset Password Modal — hiển thị mặc định (không ẩn) -->
    <div id="reset-modal" class="modal-overlay" style="opacity:1;pointer-events:auto;visibility:visible;">
        <div class="modal-container fade-in appear">
            <div class="form-card" style="margin: 0; box-shadow: none;">
                <div class="text-center" style="margin-bottom: 2rem;">
                    <h2 class="section-title" style="margin-bottom: 0.5rem; font-size: 2rem;">New Password</h2>
                    <p>Please create a new password for your account</p>
                </div>
                <form id="reset-form">
                    <div class="form-group">
                        <label class="form-label">New Password *</label>
                        <div class="password-wrapper">
                            <input type="password" id="reset-password" class="form-control" placeholder="••••••••"
                                required minlength="6">
                            <button type="button" class="toggle-password" tabindex="-1"
                                aria-label="Toggle password visibility">
                                <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Confirm Password *</label>
                        <div class="password-wrapper">
                            <input type="password" id="reset-confirm" class="form-control" placeholder="••••••••"
                                required minlength="6">
                            <button type="button" class="toggle-password" tabindex="-1"
                                aria-label="Toggle password visibility">
                                <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn" style="width: 100%; padding: 16px; font-size: 1.1rem;">Update
                        Password</button>
                </form>
            </div>
        </div>
    </div>

    <script type="module">
        import { callApi } from './js/common/api.js';
        import { initPasswordToggle } from './js/common/utils.js';

        // Lấy token từ URL
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get("token");

        if (!resetToken) {
            document.querySelector(".section-title").textContent = "Invalid Link";
            document.querySelector(".section-title + p").textContent = "This password reset link is invalid. Please request a new one.";
            document.getElementById("reset-form").style.display = "none";
        }

        // Bật toggle password eye icon
        initPasswordToggle();

        // Xử lý submit form reset password
        const resetForm = document.getElementById("reset-form");
        if (resetForm && resetToken) {
            resetForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                // Xóa lỗi cũ
                const oldError = resetForm.querySelector(".form-error");
                if (oldError) oldError.textContent = "";

                const newPassword = document.getElementById("reset-password").value;
                const confirmPassword = document.getElementById("reset-confirm").value;

                if (newPassword !== confirmPassword) {
                    showError("Passwords do not match! Please try again.");
                    return;
                }

                const submitBtn = resetForm.querySelector("button[type='submit']");
                submitBtn.innerText = "Updating...";
                submitBtn.disabled = true;

                try {
                    const { ok, data } = await callApi("/auth/reset-password", "POST", {
                        token: resetToken,
                        newPassword
                    });

                    if (ok) {
                        alert("Password updated successfully! Please login with your new password.");
                        window.location.href = "index.html";
                    } else {
                        showError(data?.message || data?.error || "Failed to reset password. The link may be expired.");
                    }
                } catch {
                    showError("Unable to connect to server. Please try again later.");
                } finally {
                    submitBtn.innerText = "Update Password";
                    submitBtn.disabled = false;
                }
            });
        }

        function showError(message) {
            let errorEl = resetForm.querySelector(".form-error");
            if (!errorEl) {
                errorEl = document.createElement("p");
                errorEl.className = "form-error";
                errorEl.style.cssText = "color:#e74c3c;font-size:0.9rem;text-align:center;margin-top:12px;";
                resetForm.appendChild(errorEl);
            }
            errorEl.textContent = message;
        }
    </script>

</body>

</html>
