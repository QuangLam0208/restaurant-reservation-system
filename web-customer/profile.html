<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Profile — San-Lorenzo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&family=Jost:wght@200;300;400&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="assets/css/layout/header.css">
  <link rel="stylesheet" href="assets/css/pages/reservation.css">
  <link rel="stylesheet" href="assets/css/profile.css">
</head>

<body>
  <!-- Global Header -->
  <header id="main-header" class="header-solid scrolled">
    <a href="index.html" class="logo">San — Lorenzo</a>
    <nav class="nav-links">
      <a href="reservation.html" class="nav-link btn-reserve-header">Reserve</a>
      <a href="#" class="nav-link" id="view-bookings-link" style="display:none;">My Bookings</a>

      <!-- Chưa đăng nhập -->
      <a href="#" id="header-auth-btn" class="nav-link auth-action-btn" style="display: flex;">Sign In</a>
      
      <!-- Đã đăng nhập -->
      <div id="nav-auth-group" class="nav-auth-group" style="display: none;">
        <span class="nav-link user-hi" id="user-greeting" style="color: var(--gold);">Hi, Guest</span>
        <div class="gear-dropdown" id="gear-dropdown">
          <button class="gear-btn" id="gear-btn">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <div class="gear-menu">
            <a href="profile.html" class="gear-menu-item">
              <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Profile
            </a>
            <div class="gear-menu-divider"></div>
            <button class="gear-menu-item danger" id="logout-btn">
              <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Sign Out
            </button>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <!-- Editorial Hero Section -->
  <section class="profile-hero">
    <div class="hero-grid">
      <!-- Left Heading -->
      <div class="hero-left anim-fade-up">
        <span class="hero-overline">— SAN-LORENZO · ROME</span>
        <h1 class="hero-heading">
          <span class="hero-title-main">Your</span>
          <span class="hero-title-accent">Profile</span>
        </h1>
        <p class="hero-subtitle">Manage your personal details and preferences.</p>
      </div>

    </div>

    <hr class="hero-divider">

    <!-- Organic Stats Strip -->

  </section>

  <!-- Body Content -->
  <section class="profile-body">

    <!-- Tabs UI -->
    <div class="profile-tabs anim-fade-up">
      <div class="profile-tab active" data-tab="tab-edit">Personal Information</div>
      <div class="profile-tab" data-tab="tab-password">Security & Password</div>
    </div>

    <!-- Luxury Soft Container -->
    <div class="profile-card-soft anim-fade-up" style="animation-delay: 0.1s;">

      <!-- Block 1: Edit Profile (Tab 1) -->
      <div id="tab-edit" class="tab-pane active profile-section">
        <div class="section-label">
          <div class="section-label-line"></div>
          <span class="section-label-text">01</span>
        </div>
        <h2 class="section-heading">
          <span class="section-heading-part-1">Edit</span>
          <span class="section-heading-part-2">Profile</span>
        </h2>

        <form id="edit-profile-form" class="form-grid">
          <!-- NAME -->
          <div class="form-field">
            <label class="field-label" for="full-name">Name</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <input type="text" id="full-name" class="flat-input" value="" placeholder="Your Name">
            </div>
          </div>

          <!-- PHONE -->
          <div class="form-field">
            <label class="field-label" for="phone">Phone</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path
                  d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                </path>
              </svg>
              <input type="tel" id="phone" class="flat-input" value="" placeholder="Phone">
            </div>
          </div>

          <!-- EMAIL -->
          <div class="form-field">
            <label class="field-label" for="email">Email</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
              <input type="email" id="email" class="flat-input" value="" placeholder="Email Address">
            </div>
            <span class="field-hint">Used for booking confirmations</span>
          </div>

          <!-- DOB -->
          <div class="form-field">
            <label class="field-label" for="dob">Date of Birth</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="16" y1="2" x2="16" y2="6"></line>
                <line x1="8" y1="2" x2="8" y2="6"></line>
                <line x1="3" y1="10" x2="21" y2="10"></line>
              </svg>
              <input type="date" id="dob" class="flat-input" value="1980-01-01">
            </div>
          </div>

          <!-- GENDER -->
          <div class="form-field form-field-full">
            <label class="field-label">Gender</label>
            <div class="gender-pill-row" id="gender-pills-new">
              <button type="button" class="pill-flat active">Male</button>
              <button type="button" class="pill-flat">Female</button>
              <button type="button" class="pill-flat">Other</button>
            </div>
          </div>

          <!-- SAVE -->
          <div class="form-field-full">
            <button type="submit" id="btn-save" class="btn-submit-profile">SAVE CHANGES</button>
          </div>
        </form>
      </div>

      <!-- Block 2: Change Password (Tab 2) -->
      <div id="tab-password" class="tab-pane profile-section password-section">
        <div class="section-label">
          <div class="section-label-line"></div>
          <span class="section-label-text">02</span>
        </div>
        <h2 class="section-heading">
          <span class="section-heading-part-1">Change</span>
          <span class="section-heading-part-2">Password</span>
        </h2>

        <form id="change-password-form" class="password-form">

          <!-- CURRENT -->
          <div class="form-field">
            <label class="field-label" for="current-password">Current Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <input type="password" id="current-password" class="flat-input" placeholder="Enter current password">
            </div>
          </div>

          <!-- NEW -->
          <div class="form-field">
            <label class="field-label" for="new-password">New Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <input type="password" id="new-password" class="flat-input" placeholder="Enter new password">
            </div>
            <div class="pwd-strength-container">
              <div class="pwd-bars">
                <div class="strength-bar bar-1"></div>
                <div class="strength-bar bar-2"></div>
                <div class="strength-bar bar-3"></div>
              </div>
              <span class="strength-label">Weak</span>
            </div>
          </div>

          <!-- CONFIRM NEW -->
          <div class="form-field">
            <label class="field-label" for="confirm-password">Confirm New Password</label>
            <div class="input-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              <input type="password" id="confirm-password" class="flat-input" placeholder="Confirm new password">
            </div>
            <span id="confirm-hint" class="validation-hint"></span>
          </div>

          <button type="submit" id="btn-update-pwd" class="btn-submit-profile">UPDATE PASSWORD</button>
        </form>
      </div>

    </div>
  </section>

  <script type="module">
    import { initAuth } from './js/features/auth.js';
    import { initProfile } from './js/pages/profile.js';
    import { openBookingsModal } from './js/features/my-bookings.js';

    document.addEventListener('DOMContentLoaded', () => {
      initAuth();
      initProfile();

      // My Bookings — gọi thẳng module đã có sẵn, không vẽ lại gì
      document.getElementById('view-bookings-link')?.addEventListener('click', (e) => {
        e.preventDefault();
        openBookingsModal();
      });
    });
  </script>
</body>

</html>
