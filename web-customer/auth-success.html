<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmed - San-Lorenzo</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        body {
            background: #1a1a2e;
            color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .confirmation-card {
            background: #16213e;
            padding: 4rem 3rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.4);
            max-width: 480px;
            width: 90%;
            border: 1px solid rgba(201, 169, 110, 0.1);
            animation: card-appear 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes card-appear {
            from {
                transform: translateY(30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(46, 204, 113, 0.15);
            color: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 2.5rem;
        }

        h1 {
            color: #2ecc71;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            letter-spacing: 0.5px;
        }

        p {
            opacity: 0.8;
            line-height: 1.8;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .instruction {
            color: var(--gold, #c9a96e);
            font-weight: 600;
        }

        .close-msg {
            font-size: 0.85rem;
            opacity: 0.5;
            margin-top: 2rem;
        }
    </style>
</head>

<body>
    <div class="confirmation-card">
        <div class="icon-box">✓</div>
        <h1>Action Confirmed!</h1>
        <p>Your request has been successfully verified.<br><br>
            <span class="instruction">Please return to your original tab</span> to continue.
        </p>
        <div class="close-msg">This window will close automatically in a few seconds...</div>
    </div>
    <script>
        setTimeout(() => window.close(), 5000);
    </script>
</body>

</html>
