<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying Email... - San-Lorenzo</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <style>
        .verify-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
        }
        .verify-container h2 { margin-bottom: 1rem; }
        .verify-container p { font-size: 1.1rem; opacity: 0.8; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.2);
            border-top-color: var(--gold, #c9a96e);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="spinner"></div>
        <h2>Verifying your email...</h2>
        <p id="verify-status">Please wait while we verify your account.</p>
    </div>

    <script type="module">
        import { callApi } from './js/common/api.js';

        async function verifyEmail() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get("token");
            const statusEl = document.getElementById("verify-status");
            const spinner = document.querySelector(".spinner");

            if (!token) {
                spinner.style.display = "none";
                statusEl.textContent = "Invalid verification link. No token provided.";
                return;
            }

            try {
                const { ok, data } = await callApi(`/auth/verify-email?token=${token}`, "GET");
                spinner.style.display = "none";

                if (ok) {
                    document.querySelector("h2").textContent = "Email Verified! ✓";
                    document.querySelector("h2").style.color = "#27ae60";
                    statusEl.innerHTML = "Your account has been verified successfully.<br>Redirecting to login...";
                    setTimeout(() => { window.location.href = "index.html"; }, 2500);
                } else {
                    document.querySelector("h2").textContent = "Verification Failed";
                    document.querySelector("h2").style.color = "#e74c3c";
                    statusEl.textContent = data?.message || "The verification link is invalid or expired.";
                }
            } catch {
                spinner.style.display = "none";
                document.querySelector("h2").textContent = "Connection Error";
                statusEl.textContent = "Unable to connect to server. Please try again later.";
            }
        }

        verifyEmail();
    </script>
</body>
</html>
