spring.application.name=reservation-api

server.port=${SERVER_PORT:8081}

# MYSQL
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/restaurant_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}
spring.datasource.username=${MYSQL_USER:root}
# MYSQL_PASSWORD env var must be set explicitly (no hardcoded fallback).
spring.datasource.password=${MYSQL_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

# JWT
jwt.secret=${JWT_SECRET:myVerySecretKeyThatIsAtLeast256BitsLongForHS256Algorithm!}
jwt.expiration-ms=${JWT_EXPIRY_MS:86400000}

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# App URL
app.base-url=${APP_BASE_URL:http://localhost:3000}

# Caffeine cache
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=15s

# Scheduler config
reservation.grace-period-minutes=15
reservation.soft-lock-minutes=5
reservation.duration-minutes=120
reservation.buffer-minutes=10
